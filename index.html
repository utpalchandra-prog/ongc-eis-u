<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#800020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ONGC EIS">
<title>ONGC EIS</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1a1a1a;min-height:100vh}
  .app{max-width:480px;margin:0 auto;padding:16px}
  h1{font-size:20px;font-weight:600;margin-bottom:4px}
  .sub{font-size:13px;color:#666;margin-bottom:20px}
  .btn{padding:10px 18px;background:#800020;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer}
  .btn:active{opacity:.75}
  .btn-outline{padding:8px 14px;background:#fff;color:#1a1a1a;border:1px solid #ddd;border-radius:10px;font-size:12px;cursor:pointer}
  .btn-link{background:none;border:none;color:#800020;font-size:12px;cursor:pointer;text-decoration:underline;padding:0}
  input[type=text],input[type=search]{width:100%;padding:10px 14px;font-size:14px;border:1px solid #ddd;border-radius:10px;background:#fff;outline:none;font-family:inherit}
  input[type=text]:focus,input[type=search]:focus{border-color:#800020;box-shadow:0 0 0 3px rgba(128,0,32,.12)}
  .cpf-input{letter-spacing:.05em;text-transform:uppercase;font-family:monospace}
  .search-row{display:flex;gap:8px;margin-bottom:10px}
  .search-row input{flex:1}
  /* Cards */
  .card{background:#fff;border-radius:14px;border:1px solid #eee;padding:16px;margin-bottom:12px}
  .emp-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .avatar{width:46px;height:46px;border-radius:50%;background:#FDF0F3;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#800020;flex-shrink:0}
  .emp-name{font-size:15px;font-weight:600;line-height:1.3}
  .emp-desig{font-size:12px;color:#666;margin-top:2px}
  .emp-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;padding-top:12px;border-top:1px solid #f0f0f0}
  .meta-item label{font-size:10px;color:#999;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
  .meta-item span{font-size:13px;font-weight:500}
  .meta-item.full{grid-column:1/-1}
  /* Key dates */
  .dates-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
  .date-box label{font-size:10px;color:#999;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
  .date-box span{font-size:12px;font-weight:500}
  .date-box.full{grid-column:1/-1}
  /* Tabs */
  .tabs{display:flex;border-bottom:1px solid #e5e5e5;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;padding:10px 14px;font-size:12px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#888;white-space:nowrap}
  .tab.active{color:#800020;border-bottom-color:#800020}
  /* Records */
  .record{background:#fff;border:1px solid #eee;border-radius:12px;padding:11px 13px;margin-bottom:8px}
  .rec-num{display:inline-block;background:#f0f0f0;color:#555;font-size:10px;font-weight:600;border-radius:4px;padding:2px 6px;margin-bottom:6px}
  .rec-title{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.4}
  .rec-sub{font-size:12px;color:#444;margin-bottom:3px}
  .rec-univ{font-size:12px;color:#800020;font-style:italic;margin-bottom:5px}
  .rec-code{font-size:11px;color:#888;font-family:monospace;margin-bottom:5px}
  .rec-dates{display:flex;gap:20px;padding-top:8px;border-top:1px solid #f0f0f0}
  .date-item label{font-size:10px;color:#999;display:block;text-transform:uppercase;letter-spacing:.04em}
  .date-item span{font-size:12px;font-weight:500}
  .badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .badge{font-size:11px;background:#f5f5f5;border:1px solid #e8e8e8;border-radius:6px;padding:3px 8px;color:#555}
  .empty{text-align:center;padding:24px 0;color:#aaa;font-size:13px}
  /* Timeline style for postings/levels */
  .timeline{position:relative;padding-left:20px}
  .timeline::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:#e5e5e5;border-radius:2px}
  .tl-item{position:relative;margin-bottom:10px}
  .tl-dot{position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;background:#800020;border:2px solid #fff;box-shadow:0 0 0 1px #378ADD}
  .tl-dot.current{background:#00A550;box-shadow:0 0 0 1px #00A550}
  .tl-content{background:#fff;border:1px solid #eee;border-radius:10px;padding:9px 12px}
  .tl-title{font-size:13px;font-weight:600;margin-bottom:2px}
  .tl-date{font-size:11px;color:#888}
  .tl-badge{display:inline-block;background:#FDF0F3;color:#800020;font-size:10px;font-weight:600;border-radius:4px;padding:2px 7px;margin-bottom:4px}
  /* Name search results */
  .name-result{background:#fff;border:1px solid #eee;border-radius:11px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
  .name-result:active{border-color:#800020;background:#f0f7ff}
  .name-result-name{font-size:13px;font-weight:600;margin-bottom:4px}
  .name-result-meta{display:flex;flex-wrap:wrap;gap:5px}
  .name-tag{font-size:11px;background:#f5f5f5;border:1px solid #e8e8e8;border-radius:5px;padding:2px 7px;color:#555}
  .name-tag.cpf{background:#FDF0F3;color:#800020;border-color:#B3D4F5;font-family:monospace}
  /* Alerts */
  .alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;line-height:1.6}
  .alert-warn{background:#FFF8E1;border:1px solid #FFE082;color:#7A5800}
  /* Upload */
  .drop-zone{border:2px dashed #ccc;border-radius:14px;padding:28px 16px;text-align:center;background:#fff;cursor:pointer;transition:border-color .2s;margin-bottom:12px}
  .drop-zone:hover,.drop-zone.drag{border-color:#800020}
  .drop-icon{font-size:36px;margin-bottom:8px}
  .drop-title{font-size:15px;font-weight:600;margin-bottom:4px}
  .drop-sub{font-size:12px;color:#888;line-height:1.6}
  /* Loading */
  .spinner{display:inline-block;width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#800020;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .progress-wrap{background:#f0f0f0;border-radius:999px;height:6px;margin:12px 0 6px;overflow:hidden}
  .progress-bar{height:6px;border-radius:999px;background:#800020;transition:width .4s}
  /* File bar */
  .file-bar{background:#E8F5E9;border:1px solid #C8E6C9;border-radius:10px;padding:9px 13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .file-bar span{font-size:11px;color:#2E7D32;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .file-bar-btns{display:flex;gap:6px;flex-shrink:0}
  /* Debug */
  .debug-box{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:12px;font-size:11px;font-family:monospace;color:#333;line-height:1.7;white-space:pre-wrap;word-break:break-all;display:none}
  /* Install banner */
  .install-banner{background:#EDE7F6;border:1px solid #B39DDB;border-radius:10px;padding:11px 13px;margin-bottom:12px;display:none;align-items:center;gap:10px}
  .install-banner p{font-size:13px;color:#4527A0;flex:1;margin:0}
  .install-banner button{background:#673AB7;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;flex-shrink:0}
  /* Search mode toggle */
  .mode-toggle{display:flex;background:#f0f0f0;border-radius:10px;padding:3px;margin-bottom:12px;gap:3px}
  .rpt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px}
  .rpt-field label{font-size:10px;color:#999;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .rpt-field input{padding:7px 10px;font-size:13px}
  .rpt-result-card{background:#fff;border:1px solid #eee;border-radius:11px;padding:11px 13px;margin-bottom:8px}
  .rpt-result-name{font-size:13px;font-weight:600;margin-bottom:5px}
  .rpt-result-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
  .rpt-match{font-size:11px;color:#800020;background:#FDF0F3;border-radius:6px;padding:4px 8px;margin-top:4px}
  .mode-btn{flex:1;padding:7px;font-size:12px;font-weight:500;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#666;transition:all .15s}
  .mode-btn.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  /* Years filter */
  .years-bar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #ddd;border-radius:10px;padding:9px 13px;margin-bottom:10px}
  .years-bar span{font-size:13px;color:#555}
  .years-bar input{width:52px;padding:5px 8px;font-size:14px;font-weight:600;border:1px solid #ddd;border-radius:8px;text-align:center;outline:none;font-family:inherit}
  .highlight{background:#fff3cd;border-radius:2px;padding:0 1px}
</style>
</head>
<body>
<div class="app">
  <h1>👤 ONGC EIS</h1>
  <p class="sub">Employee Information System &nbsp;<span id="ver" style="font-size:10px;background:#e0e0e0;border-radius:4px;padding:2px 6px;color:#888">v16</span></p>

  <div class="install-banner" id="install-banner">
    <p>📱 Install this app on your home screen!</p>
    <button onclick="installApp()">Install</button>
  </div>

  <!-- Upload -->
  <div id="upload-section">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">📊</div>
      <div class="drop-title">Load your Excel file</div>
      <div class="drop-sub">Tap to browse<br>Sheet1 · Sheet2 · Sheet3 · Sheet4</div>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xlsm,.xls" style="display:none">
  </div>

  <!-- Loading -->
  <div id="loading-section" style="display:none">
    <div class="card" style="text-align:center;padding:28px 16px">
      <div class="spinner"></div>
      <p id="load-msg" style="font-size:14px;font-weight:500;margin:12px 0 4px">Reading file…</p>
      <div class="progress-wrap"><div class="progress-bar" id="prog" style="width:5%"></div></div>
      <p id="load-sub" style="font-size:12px;color:#888;margin:0">Please wait</p>
    </div>
  </div>

  <!-- Main -->
  <div id="main-section" style="display:none">
    <div class="file-bar">
      <span id="file-label">✓ Data loaded</span>
      <div class="file-bar-btns">
        <button class="btn-outline" onclick="reloadFile()">🔄 Update</button>
        <button class="btn-outline" onclick="clearCache()" style="color:#c00">✕</button>
      </div>
    </div>

    <!-- Search mode toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-cpf" onclick="setMode('cpf')">🔢 CPF</button>
      <button class="mode-btn" id="mode-name" onclick="setMode('name')">🔤 Name</button>
      <button class="mode-btn" id="mode-report" onclick="setMode('report')">📋 Reports</button>
    </div>

    <!-- CPF search -->
    <div id="cpf-section">
      <div class="search-row">
        <input type="text" id="cpf-input" class="cpf-input" placeholder="Enter CPF No (8 chars)" maxlength="8" onkeydown="if(event.key==='Enter')doLookup()">
        <button class="btn" onclick="doLookup()">Search</button>
      </div>
      <div class="years-bar">
        <span style="flex:1">📅 Show training from last</span>
        <input type="number" id="years-input" value="5" min="1" max="99" onchange="if(db&&document.getElementById('result-area').innerHTML)doLookup()">
        <span>years only</span>
      </div>
    </div>

    <!-- Name search -->
    <div id="name-section" style="display:none">
      <div class="search-row">
        <input type="search" id="name-input" placeholder="Type name e.g. Sandeep Agarwal" oninput="doNameSearch()">
      </div>
      <div id="name-results"></div>
    </div>

    <!-- Reports / Advanced filter -->
    <div id="report-section" style="display:none">
      <div class="card" style="padding:14px">
        <div style="font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Employee Filters</div>
        <div class="rpt-grid">
          <div class="rpt-field"><label>Name contains</label><input type="text" id="rf-name" placeholder="e.g. Manish"></div>
          <div class="rpt-field"><label>Level</label><input type="text" id="rf-level" placeholder="e.g. E6"></div>
          <div class="rpt-field"><label>Location</label><input type="text" id="rf-location" placeholder="e.g. DELI, ABAD"></div>
          <div class="rpt-field"><label>Department contains</label><input type="text" id="rf-deptt" placeholder="e.g. HR"></div>
          <div class="rpt-field"><label>Discipline contains</label><input type="text" id="rf-discipline" placeholder="e.g. Mechanical"></div>
          <div class="rpt-field"><label>Gender</label><input type="text" id="rf-gender" placeholder="e.g. M / F"></div>
          <div class="rpt-field"><label>Category contains</label><input type="text" id="rf-category" placeholder="e.g. Officer"></div>
        </div>

        <div style="font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin:14px 0 10px">Training Filters</div>
        <div class="rpt-grid">
          <div class="rpt-field"><label>Training Name</label><input type="text" id="rf-trgname" placeholder="e.g. Leadership"></div>
          <div class="rpt-field"><label>Institute</label><input type="text" id="rf-institute" placeholder="e.g. IIMB"></div>
          <div class="rpt-field"><label>Training Year</label><input type="text" id="rf-trgyear" placeholder="e.g. 2023"></div>
        </div>

        <div style="font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin:14px 0 10px">Education Filters</div>
        <div class="rpt-grid">
          <div class="rpt-field"><label>Qual. Standard contains</label><input type="text" id="rf-qual" placeholder="e.g. B.Tech, Diploma"></div>
          <div class="rpt-field"><label>Subject contains</label><input type="text" id="rf-subject" placeholder="e.g. Mechanical"></div>
          <div class="rpt-field"><label>University contains</label><input type="text" id="rf-university" placeholder="e.g. IIT Delhi"></div>
        </div>

        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn" onclick="runReport()" style="flex:1">🔍 Run Report</button>
          <button class="btn-outline" onclick="clearReportFilters()">Clear</button>
        </div>
      </div>
      <div id="report-results"></div>
    </div>

    <button class="btn-link" onclick="toggleDebug()" style="margin-bottom:10px;display:block">🔍 Diagnostics</button>
    <div class="debug-box" id="debug-box"></div>
    <div id="result-area"></div>
  </div>
</div>

<script>
// Force update: unregister old SW and reload if version mismatch
var APP_VERSION = 'v12';
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(reg){
      reg.update(); // force check for new SW
    });
  });
}

var db=null, debugInfo='', deferredPrompt=null, currentMode='cpf';
var IDB_NAME='EmpLookupDB2', IDB_STORE='files', IDB_KEY='excel';

// ── IndexedDB ─────────────────────────────────────────────────────────
function openIDB(){return new Promise(function(res,rej){var r=indexedDB.open(IDB_NAME,1);r.onupgradeneeded=function(e){e.target.result.createObjectStore(IDB_STORE);};r.onsuccess=function(e){res(e.target.result);};r.onerror=rej;});}
function saveToIDB(buf,name){return openIDB().then(function(idb){return new Promise(function(res,rej){var tx=idb.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put({buf:buf,name:name,date:new Date().toLocaleDateString()},IDB_KEY);tx.oncomplete=res;tx.onerror=rej;});});}
function loadFromIDB(){return openIDB().then(function(idb){return new Promise(function(res,rej){var tx=idb.transaction(IDB_STORE,'readonly');var r=tx.objectStore(IDB_STORE).get(IDB_KEY);r.onsuccess=function(e){res(e.target.result||null);};r.onerror=rej;});});}
function deleteFromIDB(){return openIDB().then(function(idb){return new Promise(function(res,rej){var tx=idb.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(IDB_KEY);tx.oncomplete=res;tx.onerror=rej;});});}

// ── PWA ───────────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').style.display='flex';});
function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;document.getElementById('install-banner').style.display='none';});}
window.addEventListener('appinstalled',function(){document.getElementById('install-banner').style.display='none';});
// Register SW only on GitHub Pages, not in preview/local
if('serviceWorker' in navigator && location.hostname.indexOf('github.io')!==-1){
  navigator.serviceWorker.register('sw.js?v=16').then(function(reg){
    reg.update();
  }).catch(function(e){ console.warn('SW:', e); });
}

// ── Utilities ─────────────────────────────────────────────────────────
function norm(v){return String(v||'').trim().toUpperCase();}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function initials(n){return(n||'?').trim().split(/\s+/).slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase()||'?';}

function parseDate(val){
  if(val===''||val===null||val===undefined)return '';
  if(typeof val==='string'){
    var s=val.trim();
    if(s===''||s==='00.00.0000'||s==='0.0.0'||s==='00-00-0000')return '';
    // dd.mm.yyyy or dd-mm-yyyy — already correct format
    if(/^\d{1,2}[.\-]\d{1,2}[.\-]\d{4}$/.test(s)){
      var p=s.split(/[.\-]/);
      return pad(p[0])+'/'+pad(p[1])+'/'+p[2];
    }
    // mm/dd/yyyy (Excel US format) — convert to dd/mm/yyyy
    if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)){
      var p=s.split('/');
      return pad(p[1])+'/'+pad(p[0])+'/'+p[2];
    }
    // mm/dd/yy — convert to dd/mm/yyyy
    if(/^\d{1,2}\/\d{1,2}\/\d{2}$/.test(s)){
      var p=s.split('/');
      var yr=parseInt(p[2]);
      yr=yr>50?1900+yr:2000+yr;
      return pad(p[1])+'/'+pad(p[0])+'/'+yr;
    }
    // yyyy-mm-dd
    if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
      var p=s.split('-');
      return pad(p[2])+'/'+pad(p[1])+'/'+p[0];
    }
    return s;
  }
  if(typeof val==='number'){
    if(val===0)return '';
    try{var d=XLSX.SSF.parse_date_code(val);if(d)return pad(d.d)+'/'+pad(d.m)+'/'+d.y;}catch(e){}
    return String(val);
  }
  if(val instanceof Date)return pad(val.getDate())+'/'+pad(val.getMonth()+1)+'/'+val.getFullYear();
  return String(val);
}

function toJSDate(val){
  if(!val||val===''||val===0)return null;
  if(typeof val==='number'){try{var d=XLSX.SSF.parse_date_code(val);if(d)return new Date(d.y,d.m-1,d.d);}catch(e){}return null;}
  var s=String(val).trim();
  if(s==='00.00.0000'||s==='0.0.0'||s==='')return null;
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)){var p=s.split('.');return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
  if(/^\d{2}-\d{2}-\d{4}$/.test(s)){var p=s.split('-');return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
  var d=new Date(val);return isNaN(d)?null:d;
}

function getF(obj,keys){
  if(!obj)return '';
  var ok=Object.keys(obj);
  for(var i=0;i<keys.length;i++){var t=norm(keys[i]);var f=ok.find(function(k){return norm(k)===t;});if(f!==undefined){var v=obj[f];if(v!==''&&v!==undefined&&v!==null&&String(v).trim()!=='')return String(v);}}
  return '';
}
function getDF(obj,keys){
  if(!obj)return '';
  var ok=Object.keys(obj);
  for(var i=0;i<keys.length;i++){var t=norm(keys[i]);var f=ok.find(function(k){return norm(k)===t;});if(f!==undefined){var v=obj[f];if(v!==''&&v!==undefined&&v!==null)return parseDate(v);}}
  return '';
}
function cpfKey(row){
  var variants=['CPFNO','CPF NO','CPF_NO','CPF','CPFNUMBER','CPFNO.','CPFN'];
  var ok=Object.keys(row);
  for(var i=0;i<variants.length;i++){var f=ok.find(function(k){return norm(k)===variants[i];});if(f!==undefined&&row[f]!==''&&row[f]!==undefined)return norm(row[f]);}
  return '';
}
function findSheet(wb,patterns){

}

// ── Metaphone (handles Indian names well) ────────────────────────────
function metaphone(word){
  word=word.toUpperCase().replace(/[^A-Z]/g,'');
  if(!word)return '';
  // Normalize common double-letter / silent combos
  word=word.replace(/GH/g,'G').replace(/KH/g,'K').replace(/PH/g,'F')
           .replace(/SH/g,'S').replace(/TH/g,'T').replace(/CH/g,'S');
  var code='',prev='',vocals='AEIOU';
  var map={B:'B',C:'S',D:'T',F:'F',G:'K',H:'',J:'J',K:'K',L:'L',
           M:'M',N:'N',P:'P',Q:'K',R:'R',S:'S',T:'T',V:'F',W:'',X:'KS',Y:'',Z:'S'};
  for(var i=0;i<word.length;i++){
    var c=word[i];
    if(vocals.indexOf(c)!==-1){if(i===0)code+='A';prev=c;continue;}
    var m=map[c]||'';
    if(m&&m!==prev){code+=m;prev=m;}
  }
  return code;
}
// Keep soundex as fallback
function soundex(s){
  s=s.toUpperCase().replace(/[^A-Z]/g,'');
  if(!s)return '';
  var map={B:'1',F:'1',P:'1',V:'1',C:'2',G:'2',J:'2',K:'2',Q:'2',S:'2',X:'2',Z:'2',D:'3',T:'3',L:'4',M:'5',N:'5',R:'6'};
  var code=s[0],prev=map[s[0]]||'0';
  for(var i=1;i<s.length&&code.length<4;i++){var c=map[s[i]]||'0';if(c!=='0'&&c!==prev)code+=c;prev=c;}
  return (code+'000').slice(0,4);
}
// Levenshtein distance (edit distance)
function levenshtein(a,b){
  var m=a.length,n=b.length,dp=[],i,j;
  for(i=0;i<=m;i++){dp[i]=[i];}
  for(j=0;j<=n;j++){dp[0][j]=j;}
  for(i=1;i<=m;i++){for(j=1;j<=n;j++){
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  }}
  return dp[m][n];
}

  // Show first 3 name index entries for debugging
  debugInfo+='\n\n=== NAME INDEX SAMPLE (first 3) ===\n';
  nameIndex.slice(0,3).forEach(function(e){
    debugInfo+=e.cpf+' | '+e.name+' | sdx:'+e.sdx.join(',')+'  mtf:'+e.mtf.join(',')+'\n';
  });
  if(nameIndex.length===0){
    debugInfo+='WARNING: Name index is EMPTY!\n';
    debugInfo+='Sheet3 columns: '+(s3.length?Object.keys(s3[0]).join(' | '):'no data')+'\n';
    debugInfo+='Sheet4 columns: '+(s4.length?Object.keys(s4[0]).join(' | '):'no data')+'\n';
  }
  if(sampleCPF)debugInfo+='\n\nSample CPF: "'+sampleCPF+'"';
  document.getElementById('debug-box').textContent=debugInfo;

  db={empMap:empMap,trainMap:trainMap,eduMap:eduMap,sheet4Map:sheet4Map,sheet5Map:sheet5Map,sheet6Map:sheet6Map,nameIndex:nameIndex};
  setProgress(100,'Ready!','');
  setTimeout(function(){
    document.getElementById('loading-section').style.display='none';
    document.getElementById('upload-section').style.display='none';
    document.getElementById('main-section').style.display='block';
    document.getElementById('file-label').textContent='✓ '+Object.keys(empMap).length+' emp · '+s1.length+' trg · '+s2.length+' edu · '+Object.keys(sheet4Map).length+' hist · '+s5.length+' par · '+s6.length+' adc';
    document.getElementById('cpf-input').focus();
  },400);
}

function loadArrayBuffer(buf,fileName,saveCache){
  document.getElementById('upload-section').style.display='none';
  document.getElementById('loading-section').style.display='block';
  setProgress(5,'Reading file…','Large files take a moment — please wait');
  setTimeout(function(){
    try{
      setProgress(20,'Parsing Excel…','');
      var wb=XLSX.read(buf,{type:'array',cellDates:false,raw:false});
      if(saveCache){saveToIDB(buf,fileName).catch(function(e){console.warn('IDB:',e);});}
      processWorkbook(wb,fileName);
    }catch(err){
      document.getElementById('loading-section').style.display='none';
      document.getElementById('upload-section').style.display='block';
      alert('Could not read file: '+err.message+'\n\nTip: Re-save as .xlsx in Excel and try again.');
    }
  },50);
}

// ── Name search ───────────────────────────────────────────────────────
function doNameSearch(){
  var q=document.getElementById('name-input').value.trim();
  var nr=document.getElementById('name-results');
  if(!db||q.length<2){nr.innerHTML='';return;}

  // Debug: show what metaphone/soundex the query produces
  var dbgWords=q.toUpperCase().split(/\s+/).filter(Boolean);
  var dbgInfo='Query: '+dbgWords.map(function(w){return w+'→mtf:'+metaphone(w)+' sdx:'+soundex(w);}).join(' | ');
  // Find employees with similar names for comparison
  var similar=db.nameIndex.filter(function(e){
    return e.name.toUpperCase().indexOf(dbgWords[0].slice(0,5))!==-1;
  }).slice(0,3).map(function(e){return e.name+'(mtf:'+e.mtf[e.mtf.length-1]+')';}).join(', ');
  if(similar) dbgInfo+='\nSimilar in index: '+similar;
  document.getElementById('debug-box').textContent=dbgInfo+(document.getElementById('debug-box').textContent?'\n---\n'+document.getElementById('debug-box').textContent:'');

  var words=q.toUpperCase().split(/\s+/).filter(Boolean);
  var qSdx=words.map(soundex);
  var qMtf=words.map(metaphone);

  // Score each employee using metaphone + soundex + substring
  // NOTE: Levenshtein only applied to top candidates (too slow for 65k employees)
  var scored=[];
  db.nameIndex.forEach(function(emp){
    var score=0;
    words.forEach(function(w,i){
      // 1. Exact substring match in full name — highest score
      if(emp.name.toUpperCase().indexOf(w)!==-1) score+=20;

      emp.words.forEach(function(ew){
        // 2. Word starts with query word
        if(ew.indexOf(w)===0) score+=8;

        // 3. Metaphone match — handles AGGARWAL/AGARWAL/AGRAWAL etc.
        if(qMtf[i] && metaphone(ew)===qMtf[i]) score+=15;

        // 4. Soundex match — additional phonetic fuzzy
        if(qSdx[i] && soundex(ew)===qSdx[i]) score+=10;
      });
    });
    if(score>0) scored.push({emp:emp,score:score});
  });

  // Apply Levenshtein ONLY on top 200 candidates (avoids browser freeze)
  var top200 = scored.sort(function(a,b){return b.score-a.score;}).slice(0,200);
  top200.forEach(function(item){
    words.forEach(function(w){
      item.emp.words.forEach(function(ew){
        var dist=levenshtein(w,ew);
        if(dist===1) item.score+=6;
        else if(dist===2&&w.length>=5) item.score+=3;
      });
    });
  });
  // Re-sort after levenshtein boost
  var scored = top200;

  // Sort by score desc
  scored.sort(function(a,b){return b.score-a.score;});
  var top=scored.slice(0,20);

  if(!top.length){nr.innerHTML='<div class="empty">No matching employees found</div>';return;}

  // Highlight matched text
  function highlight(text, words){
    var result=esc(text);
    words.forEach(function(w){
      var re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'gi');
      result=result.replace(re,'<span class="highlight">$1</span>');
    });
    return result;
  }

  var html='<p style="font-size:11px;color:#aaa;margin-bottom:8px">'+top.length+(scored.length>20?' of '+scored.length:'')+' results — tap to view</p>';
  top.forEach(function(item){
    var e=item.emp;
    html+='<div class="name-result" onclick="selectEmployee(\''+esc(e.cpf)+'\')">';
    html+='<div class="name-result-name">'+highlight(e.name,words)+'</div>';
    html+='<div class="name-result-meta">';
    html+='<span class="name-tag cpf">'+esc(e.cpf)+'</span>';
    if(e.desig)html+='<span class="name-tag">'+esc(e.desig)+'</span>';
    if(e.level)html+='<span class="name-tag">'+esc(e.level)+'</span>';
    if(e.loc)html+='<span class="name-tag">📍'+esc(e.loc)+'</span>';
    html+='</div></div>';
  });
  nr.innerHTML=html;
}

var lastReportResults=[]; // for CSV export

function runReport(){
  if(!db){alert('Please load Excel file first');return;}
  var rr=document.getElementById('report-results');
  rr.innerHTML='<div class="empty">Searching…</div>';

  function v(id){return document.getElementById(id).value.trim().toUpperCase();}
  var fName=v('rf-name'), fLevel=v('rf-level'), fLoc=v('rf-location'),
      fDeptt=v('rf-deptt'), fDisc=v('rf-discipline'),
      fGender=v('rf-gender'), fCat=v('rf-category'),
      fTrgName=v('rf-trgname'), fInstitute=v('rf-institute'), fTrgYear=v('rf-trgyear'),
      fQual=v('rf-qual'), fSubject=v('rf-subject'), fUniv=v('rf-university');

  var anyFilter = fName||fLevel||fLoc||fDeptt||fDisc||fGender||fCat||
                  fTrgName||fInstitute||fTrgYear||fQual||fSubject||fUniv;
  if(!anyFilter){
    rr.innerHTML='<div class="alert alert-warn">Please enter at least one filter criteria.</div>';
    return;
  }

  // Use setTimeout so "Searching..." renders before the heavy loop runs
  setTimeout(function(){
    var results=[];
    var cpfSet={};
    Object.keys(db.empMap).forEach(function(c){cpfSet[c]=1;});
    if(db.sheet4Map)Object.keys(db.sheet4Map).forEach(function(c){cpfSet[c]=1;});
    var allCPFs=Object.keys(cpfSet);

    allCPFs.forEach(function(cpf){
      var emp=db.empMap[cpf];
      var s4row=db.sheet4Map?db.sheet4Map[cpf]:null;
      if(!emp && !s4row)return;

      // Employee-level filters — check Sheet3 first, fallback to Sheet4 (all must match - AND)
      var empName=norm(getF(emp,['NAME'])||getF(s4row,['NAME']));
      var empLevel=norm(getF(emp,['LEVEL','LVL'])||getF(s4row,['LEVEL','LVL']));
      var empLoc=norm(getF(emp,['LOCATION','LOC','LOCCD'])||getF(s4row,['PERSONAL AREA','LOCATION']));
      var empDeptt=norm(getF(emp,['DEPTT','DEPT','DEPARTMENT'])||getF(s4row,['DEPTT','DEPARTMENT']));
      var empDisc=norm(getF(emp,['DISCIPLINE TEXT','DISCIPLINE'])||getF(s4row,['DISCIPLINE TEXT','DISCIPLINE']));
      var empGender=norm(getF(s4row,['GENDER KEY','GENDER'])||getF(emp,['GENDER KEY','GENDER']));
      var empCat=norm(getF(s4row,['CATEGORY'])||getF(emp,['CATEGORY']));

      if(fName && empName.indexOf(fName)===-1) return;
      if(fLevel && empLevel!==fLevel) return;
      if(fLoc && empLoc!==fLoc) return;
      if(fDeptt && empDeptt.indexOf(fDeptt)===-1) return;
      if(fDisc && empDisc.indexOf(fDisc)===-1) return;
      if(fGender && empGender!==fGender) return;
      if(fCat && empCat.indexOf(fCat)===-1) return;

      // Training filters — at least one training row must match ALL given training filters
      var matchedTrg=null;
      if(fTrgName||fInstitute||fTrgYear){
        var trainRows=db.trainMap[cpf]||[];
        matchedTrg=trainRows.find(function(r){
          if(fTrgName && norm(getF(r,['TRG','TRAINING NAME','TRAINING','COURSE','TITLE'])).indexOf(fTrgName)===-1) return false;
          if(fInstitute && norm(getF(r,['INSTITUTE','INSTITUTE NAME','INST NAME'])).indexOf(fInstitute)===-1 &&
             norm(getF(r,['INST','INST CODE','INSTITUTE CODE'])).indexOf(fInstitute)===-1) return false;
          if(fTrgYear){
            var d1=getDF(r,['DATE1','FROM DATE','FROMDATE','START DATE']);
            var d2=getDF(r,['DATE2','TO DATE','TODATE','END DATE']);
            if(d1.indexOf(fTrgYear)===-1 && d2.indexOf(fTrgYear)===-1) return false;
          }
          return true;
        });
        if(!matchedTrg) return; // no training row matched — exclude employee
      }

      // Education filters — at least one education row must match ALL given edu filters
      var matchedEdu=null;
      if(fQual||fSubject||fUniv){
        var eduRows=db.eduMap[cpf]||[];
        matchedEdu=eduRows.find(function(r){
          if(fQual && norm(getF(r,['QSTDTXT','QSTD TEXT','STANDARD TEXT','BOARD','QUALXT','QUALIFICATION'])).indexOf(fQual)===-1) return false;
          if(fSubject && norm(getF(r,['SUBTXT','SUBJECT TEXT','SUBJECT NAME'])).indexOf(fSubject)===-1 &&
             norm(getF(r,['SUBJECT','SUB','SUBCD'])).indexOf(fSubject)===-1) return false;
          if(fUniv && norm(getF(r,['UNIVTEXT','UNIVERSITY','UNIVERSITY NAME','UNIVNAME'])).indexOf(fUniv)===-1) return false;
          return true;
        });
        if(!matchedEdu) return; // no education row matched — exclude employee
      }

      results.push({
        cpf:cpf,
        name:getF(emp,['NAME'])||getF(s4row,['NAME']),
        level:getF(emp,['LEVEL','LVL'])||getF(s4row,['LEVEL','LVL']),
        location:getF(emp,['LOCATION','LOC','LOCCD'])||getF(s4row,['PERSONAL AREA','LOCATION']),
        designation:getF(s4row,['DESIGNATION TEXT','DESIGNATION'])||getF(emp,['DESIGNATION','DESIG']),
        deptt:getF(emp,['DEPTT','DEPT','DEPARTMENT'])||getF(s4row,['DEPTT','DEPARTMENT']),
        discipline:getF(emp,['DISCIPLINE TEXT','DISCIPLINE'])||getF(s4row,['DISCIPLINE TEXT','DISCIPLINE']),
        gender:getF(s4row,['GENDER KEY','GENDER'])||getF(emp,['GENDER KEY','GENDER']),
        category:getF(s4row,['CATEGORY'])||getF(emp,['CATEGORY']),
        matchedTrgName: matchedTrg?getF(matchedTrg,['TRG','TRAINING NAME','TRAINING','COURSE','TITLE']):'',
        matchedInstitute: matchedTrg?getF(matchedTrg,['INSTITUTE','INSTITUTE NAME']):'',
        matchedQual: matchedEdu?getF(matchedEdu,['QSTDTXT','QSTD TEXT','STANDARD TEXT','BOARD','QUALXT','QUALIFICATION']):'',
        matchedSubject: matchedEdu?getF(matchedEdu,['SUBTXT','SUBJECT TEXT','SUBJECT NAME']):'',
        matchedUniv: matchedEdu?getF(matchedEdu,['UNIVTEXT','UNIVERSITY','UNIVERSITY NAME']):''
      });
    });

    lastReportResults = results;
    renderReportResults(results);
  }, 30);
}

function renderReportResults(results){
  var rr=document.getElementById('report-results');
  if(!results.length){
    rr.innerHTML='<div class="empty">No employees match these criteria.</div>';
    return;
  }

  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 10px">';
  html+='<span style="font-size:13px;font-weight:600;color:#333">'+results.length+' employee(s) found</span>';
  html+='<button class="btn-outline" onclick="exportReportCSV()">⬇️ Export CSV</button>';
  html+='</div>';

  var showLimit=200;
  results.slice(0,showLimit).forEach(function(e){
    html+='<div class="rpt-result-card" onclick="selectEmployee(\''+esc(e.cpf)+'\')" style="cursor:pointer">';
    html+='<div class="rpt-result-name">'+esc(e.name||'(No name)')+'</div>';
    html+='<div class="rpt-result-tags">';
    html+='<span class="name-tag cpf">'+esc(e.cpf)+'</span>';
    if(e.level)html+='<span class="name-tag">'+esc(e.level)+'</span>';
    if(e.location)html+='<span class="name-tag">📍'+esc(e.location)+'</span>';
    if(e.designation)html+='<span class="name-tag">'+esc(e.designation)+'</span>';
    if(e.deptt)html+='<span class="name-tag">'+esc(e.deptt)+'</span>';
    html+='</div>';
    if(e.matchedTrgName||e.matchedInstitute)html+='<div class="rpt-match">🎓 Training: '+esc(e.matchedTrgName)+(e.matchedInstitute?' @ '+esc(e.matchedInstitute):'')+'</div>';
    if(e.matchedQual||e.matchedUniv)html+='<div class="rpt-match">📘 '+esc(e.matchedQual)+(e.matchedUniv?' — '+esc(e.matchedUniv):'')+'</div>';
    html+='</div>';
  });

  if(results.length>showLimit){
    html+='<div style="text-align:center;font-size:12px;color:#aaa;padding:10px 0">Showing first '+showLimit+' of '+results.length+' — refine filters or export CSV for full list</div>';
  }

  rr.innerHTML=html;
}

function exportReportCSV(){
  if(!lastReportResults.length){alert('No results to export');return;}
  var headers=['CPF No','Name','Level','Location','Designation','Department','Discipline','Gender','Category','Matched Training','Matched Institute','Matched Qualification','Matched Subject','Matched University'];
  var rows=[headers];
  lastReportResults.forEach(function(e){
    rows.push([e.cpf,e.name,e.level,e.location,e.designation,e.deptt,e.discipline,e.gender,e.category,
               e.matchedTrgName,e.matchedInstitute,e.matchedQual,e.matchedSubject,e.matchedUniv]);
  });
  var csv=rows.map(function(row){
    return row.map(function(cell){
      var s=String(cell==null?'':cell).replace(/"/g,'""');
      return '"'+s+'"';
    }).join(',');
  }).join('\r\n');

  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='employee_report_'+(new Date().toISOString().slice(0,10))+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

    '<div style="text-align:right;margin-bottom:8px"><button onclick="generatePDF()" style="background:#800020;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;">⬇️ Download PDF</button></div>'+
    '<div class="tabs">'+
      '<button class="tab active" id="tab-t"  onclick="switchTab(\'t\')">Training ('+filtered.length+(skipped>0?'+'+skipped:'')+')' + '</button>'+
      '<button class="tab"        id="tab-e"  onclick="switchTab(\'e\')">Education ('+edu.length+')</button>'+
      '<button class="tab"        id="tab-p"  onclick="switchTab(\'p\')">Postings</button>'+
      '<button class="tab"        id="tab-l"  onclick="switchTab(\'l\')">Levels</button>'+
      '<button class="tab"        id="tab-par" onclick="switchTab(\'par\')">Attributes</button>'+
    '</div>'+
    '<div id="pane-t">'+trainHtml+'</div>'+
    '<div id="pane-e" style="display:none">'+eduHtml+'</div>'+
    '<div id="pane-p" style="display:none">'+postHtml+'</div>'+
    '<div id="pane-l" style="display:none">'+promHtml+'</div>'+
    '<div id="pane-par" style="display:none">'+adcHtml+parHtml+'</div>';
}

// ── PDF Export ───────────────────────────────────────────────────────
function generatePDF(){
  if(typeof window.jspdf === 'undefined'){
    alert('PDF library not loaded yet. Please wait a moment and try again.');
    return;
  }
  var doc = new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var pageW = 210, pageH = 297, margin = 15, y = margin;
  var col1 = margin, col2 = margin + 95;
  var maxW = pageW - margin*2;

  // Colors
  var maroon = [128,0,32], green = [0,165,80], grey = [100,100,100], black = [30,30,30], lightgrey = [230,230,230];

  function checkPage(needed){
    if(y + needed > pageH - margin){
      doc.addPage();
      y = margin;
    }
  }

  function sectionHeader(title){
    checkPage(12);
    doc.setFillColor(maroon[0],maroon[1],maroon[2]);
    doc.rect(margin, y, maxW, 7, 'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(9);
    doc.setFont('helvetica','bold');
    doc.text(title, margin+3, y+5);
    y += 10;
    doc.setTextColor(black[0],black[1],black[2]);
  }

  function fieldRow(label, value, x, width){
    if(!value||value==='')return;
    doc.setFontSize(7.5);
    doc.setFont('helvetica','bold');
    doc.setTextColor(grey[0],grey[1],grey[2]);
    doc.text(label.toUpperCase(), x, y);
    doc.setFont('helvetica','normal');
    doc.setTextColor(black[0],black[1],black[2]);
    doc.setFontSize(9);
    var lines = doc.splitTextToSize(String(value), width-2);
    doc.text(lines, x, y+4);
    return lines.length * 4 + 4;
  }

  function twoCol(l1,v1,l2,v2){
    checkPage(14);
    var h1 = fieldRow(l1,v1,col1,90)||0;
    var h2 = fieldRow(l2,v2,col2,90)||0;
    y += Math.max(h1,h2,10);
  }

  function oneCol(label, value){
    if(!value||value==='')return;
    checkPage(14);
    var h = fieldRow(label, value, col1, maxW)||0;
    y += h + 2;
  }

  function divider(){
    doc.setDrawColor(lightgrey[0],lightgrey[1],lightgrey[2]);
    doc.line(margin, y, margin+maxW, y);
    y += 4;
  }

  // Get current employee data from DOM
  var empName  = document.querySelector('.emp-name') ? document.querySelector('.emp-name').innerText : '';
  var empDesig = document.querySelector('.emp-desig') ? document.querySelector('.emp-desig').innerText : '';

  // Get all meta items from card
  var metaItems = {};
  document.querySelectorAll('.meta-item').forEach(function(el){
    var lbl = el.querySelector('label');
    var val = el.querySelector('span');
    if(lbl&&val) metaItems[lbl.innerText.trim()] = val.innerText.trim();
  });

  // Get key dates
  var dateItems = {};
  document.querySelectorAll('.date-box').forEach(function(el){
    var lbl = el.querySelector('label');
    var val = el.querySelector('span');
    if(lbl&&val) dateItems[lbl.innerText.trim()] = val.innerText.trim();
  });

  // ── HEADER ──
  doc.setFillColor(maroon[0],maroon[1],maroon[2]);
  doc.rect(0, 0, pageW, 22, 'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text('ONGC EIS — Employee Profile', margin, 10);
  doc.setFontSize(8);
  doc.setFont('helvetica','normal');
  doc.text('Generated: '+new Date().toLocaleDateString('en-IN'), margin, 16);
  doc.text('CONFIDENTIAL', pageW-margin-25, 16);
  y = 28;

  // ── EMPLOYEE DETAILS ──
  sectionHeader('EMPLOYEE DETAILS');
  checkPage(20);
  doc.setFontSize(13);
  doc.setFont('helvetica','bold');
  doc.setTextColor(maroon[0],maroon[1],maroon[2]);
  doc.text(empName||'', margin, y);
  y += 6;
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.setTextColor(grey[0],grey[1],grey[2]);
  doc.text(empDesig||'', margin, y);
  y += 8;

  twoCol('CPF No', metaItems['CPF No']||'', 'Level', metaItems['Level']||'');
  twoCol('Location', metaItems['Location']||'', 'Gender', metaItems['Gender']||'');
  twoCol('Category', metaItems['Category']||'', 'Discipline', metaItems['Discipline']||'');
  oneCol('Department', metaItems['Department']||'');
  oneCol('Position', metaItems['Position']||'');
  oneCol('Phone', metaItems['Phone']||'');
  y += 4;

  // ── KEY DATES ──
  if(Object.keys(dateItems).length){
    sectionHeader('KEY DATES');
    var dateKeys = Object.keys(dateItems);
    for(var i=0;i<dateKeys.length;i+=2){
      twoCol(dateKeys[i], dateItems[dateKeys[i]], dateKeys[i+1]||'', dateItems[dateKeys[i+1]]||'');
    }
    y += 2;
  }

  // ── TRAINING ──
  var trnRecords = document.querySelectorAll('#pane-t .record');
  if(trnRecords.length){
    sectionHeader('TRAINING HISTORY');
    trnRecords.forEach(function(rec, idx){
      checkPage(20);
      var title = rec.querySelector('.rec-title') ? rec.querySelector('.rec-title').innerText : '';
      var code  = rec.querySelector('.rec-code')  ? rec.querySelector('.rec-code').innerText  : '';
      var sub   = rec.querySelector('.rec-sub')   ? rec.querySelector('.rec-sub').innerText   : '';
      var dates = rec.querySelectorAll('.date-item');
      var d1='', d2='';
      if(dates[0]) d1=dates[0].innerText.split('\n').pop().trim();
      if(dates[1]) d2=dates[1].innerText.split('\n').pop().trim();

      doc.setFillColor(248,248,248);
      doc.rect(margin, y, maxW, 6, 'F');
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(black[0],black[1],black[2]);
      var titleLines = doc.splitTextToSize((idx+1)+'. '+title, maxW-40);
      doc.text(titleLines, margin+2, y+4.5);
      if(d1||d2){
        doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(grey[0],grey[1],grey[2]);
        doc.text((d1?'From: '+d1:'')+(d2?' To: '+d2:''), pageW-margin-2, y+4.5, {align:'right'});
      }
      y += titleLines.length * 4.5 + 2;
      if(sub){
        doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(green[0],green[1],green[2]);
        doc.text(sub, margin+4, y);
        y += 5;
      }
      if(code){
        doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(grey[0],grey[1],grey[2]);
        doc.text(code, margin+4, y);
        y += 4;
      }
      y += 2;
    });
  }

  // ── EDUCATION ──
  var eduRecords = document.querySelectorAll('#pane-e .record');
  if(eduRecords.length){
    sectionHeader('EDUCATION');
    eduRecords.forEach(function(rec, idx){
      checkPage(18);
      var title = rec.querySelector('.rec-title') ? rec.querySelector('.rec-title').innerText : '';
      var sub   = rec.querySelector('.rec-sub')   ? rec.querySelector('.rec-sub').innerText   : '';
      var univ  = rec.querySelector('.rec-univ')  ? rec.querySelector('.rec-univ').innerText  : '';
      var badges = rec.querySelectorAll('.badge');
      var badgeText = Array.from(badges).map(function(b){return b.innerText;}).join('  |  ');

      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(black[0],black[1],black[2]);
      doc.text((idx+1)+'. '+title, margin+2, y);
      y += 5;
      if(sub){
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(black[0],black[1],black[2]);
        doc.text(sub, margin+4, y); y+=5;
      }
      if(univ){
        doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(green[0],green[1],green[2]);
        doc.text(univ.replace('🎓 ',''), margin+4, y); y+=5;
      }
      if(badgeText){
        doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(grey[0],grey[1],grey[2]);
        doc.text(badgeText, margin+4, y); y+=5;
      }
      y += 2;
    });
  }

  // ── POSTINGS ──
  var postItems = document.querySelectorAll('#pane-p .tl-content');
  if(postItems.length){
    sectionHeader('POSTING HISTORY');
    postItems.forEach(function(item, idx){
      checkPage(12);
      var title = item.querySelector('.tl-title') ? item.querySelector('.tl-title').innerText : '';
      var date  = item.querySelector('.tl-date')  ? item.querySelector('.tl-date').innerText  : '';
      var badge = item.querySelector('.tl-badge') ? '(Current) ' : '';
      doc.setFontSize(9);doc.setFont('helvetica','bold');
      doc.setTextColor(badge ? green[0]:black[0], badge ? green[1]:black[1], badge ? green[2]:black[2]);
      doc.text(badge+(idx+1)+'. '+title, margin+4, y);
      if(date){
        doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(grey[0],grey[1],grey[2]);
        doc.text(date, margin+8, y+4.5); y+=4.5;
      }
      y += 6;
    });
  }

  // ── LEVELS/PROMOTIONS ──
  var levelItems = document.querySelectorAll('#pane-l .tl-content');
  if(levelItems.length){
    sectionHeader('PROMOTION / LEVEL HISTORY');
    levelItems.forEach(function(item, idx){
      checkPage(12);
      var title = item.querySelector('.tl-title') ? item.querySelector('.tl-title').innerText : '';
      var date  = item.querySelector('.tl-date')  ? item.querySelector('.tl-date').innerText  : '';
      var badge = item.querySelector('.tl-badge') ? true : false;
      doc.setFontSize(badge?11:9);doc.setFont('helvetica','bold');
      doc.setTextColor(badge ? green[0]:black[0], badge ? green[1]:black[1], badge ? green[2]:black[2]);
      doc.text((badge?'► ':'')+title, margin+4, y);
      if(date){
        doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(grey[0],grey[1],grey[2]);
        doc.text(date, margin+8, y+4.5); y+=4.5;
      }
      y += 6;
    });
  }

  // ── ATTRIBUTES (PAR + ADC) ──
  var paneAttr = document.getElementById('pane-par');
  if(paneAttr){
    // ADC Score
    var adcScore = paneAttr.querySelector('[style*="font-size:36px"]');
    var adcYear  = paneAttr.querySelector('[style*="Year:"]');
    var adcLevel = paneAttr.querySelector('[style*="Level:"]');
    if(adcScore){
      sectionHeader('ADC SCORE');
      checkPage(16);
      doc.setFontSize(20);doc.setFont('helvetica','bold');doc.setTextColor(maroon[0],maroon[1],maroon[2]);
      doc.text(adcScore.innerText||'', margin+4, y+8);
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(black[0],black[1],black[2]);
      if(adcYear) doc.text(adcYear.innerText||'', margin+30, y+4);
      if(adcLevel) doc.text(adcLevel.innerText||'', margin+30, y+9);
      y += 16;
    }

    // PAR records
    var parCards = paneAttr.querySelectorAll('.record');
    if(parCards.length){
      sectionHeader('PAR RECORDS');
      parCards.forEach(function(card){
        checkPage(30);
        var header = card.querySelector('[style*="justify-content:space-between"]');
        var marks  = card.querySelector('[style*="font-size:18px"]');
        var grade  = card.querySelectorAll('[style*="font-size:18px"]');
        var penPic = card.querySelector('[style*="text-align:justify"]');
        var yearEl = card.querySelector('.rec-num');

        if(yearEl){
          doc.setFillColor(248,248,248);doc.rect(margin,y,maxW,6,'F');
          doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(maroon[0],maroon[1],maroon[2]);
          doc.text('Year: '+yearEl.innerText, margin+2, y+4.5);
          y+=8;
        }
        if(marks||grade.length){
          doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(black[0],black[1],black[2]);
          var scoreText = '';
          if(marks) scoreText += 'PAR Marks: '+marks.innerText+'  ';
          if(grade[1]) scoreText += 'PAR Grade: '+grade[1].innerText;
          doc.text(scoreText, margin+2, y); y+=6;
        }
        if(penPic&&penPic.innerText.trim()){
          doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(grey[0],grey[1],grey[2]);
          doc.text('Pen Picture:', margin+2, y); y+=4;
          doc.setTextColor(black[0],black[1],black[2]);
          var lines = doc.splitTextToSize(penPic.innerText.trim(), maxW-4);
          lines.forEach(function(line){
            checkPage(5);
            doc.text(line, margin+2, y); y+=4.5;
          });
          y+=3;
        }
      });
    }
  }

  // ── FOOTER on all pages ──
  var pageCount = doc.internal.getNumberOfPages();
  for(var i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFillColor(maroon[0],maroon[1],maroon[2]);
    doc.rect(0, pageH-10, pageW, 10, 'F');
    doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','normal');
    doc.text('ONGC EIS — Confidential — Not for distribution', margin, pageH-4);
    doc.text('Page '+i+' of '+pageCount, pageW-margin, pageH-4, {align:'right'});
  }

  // Save
  var cpf = (metaItems['CPF No']||'employee').replace(/[^a-zA-Z0-9]/g,'');
  doc.save('ONGC_EIS_'+cpf+'_'+new Date().toISOString().slice(0,10)+'.pdf');
}

function switchTab(t){
  ['t','e','p','l','par'].forEach(function(id){
    var tab=document.getElementById('tab-'+id);
    var pane=document.getElementById('pane-'+id);
    if(tab)tab.className='tab'+(id===t?' active':'');
    if(pane)pane.style.display=id===t?'block':'none';
  });
}
</script>
